name: Deploy to CloudBase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check files
        run: |
          echo "=== 检查文件结构 ==="
          ls -la
          ls -la frontend/ 2>/dev/null || echo "❌ frontend 目录不存在!"

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest
          tcb --version

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy Frontend
        run: |
          if [ ! -d "frontend" ]; then
            echo "❌ frontend 目录不存在!"
            exit 1
          fi
          if [ ! -f "frontend/index.html" ]; then
            echo "❌ frontend/index.html 不存在!"
            exit 1
          fi

          echo "✅ 开始部署前端..."
          tcb hosting deploy ./frontend /             -e ${{ secrets.TCB_ENV_ID }}             --yes
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check backend
        run: |
          if [ ! -d "backend" ] || [ ! -f "backend/Dockerfile" ]; then
            echo "⚠️ backend 不存在，跳过"
            exit 0
          fi
          echo "✅ 发现 backend，开始部署..."

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli@latest

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId "${{ secrets.TCB_SECRET_ID }}" --apiKey "${{ secrets.TCB_SECRET_KEY }}"

      - name: Deploy Backend
        run: |
          if [ ! -d "backend" ] || [ ! -f "backend/Dockerfile" ]; then
            exit 0
          fi

          cd backend
          echo "=== 部署后端 ==="

          # 使用 tcb run service:create 创建服务（CLI 3.2.2 支持）
          # 参考: https://cloud.tencent.com/document/product/1243/76108
          tcb run service:create             -e ${{ secrets.TCB_ENV_ID }}             -s material-api             --containerPort 8080             --path .             --cpu 0.25             --mem 0.5             --minNum 1             --maxNum 5             --yes
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Results
        run: |
          echo "部署结果:"
          echo "  前端: ${{ needs.deploy-frontend.result }}"
          echo "  后端: ${{ needs.deploy-backend.result }}"
